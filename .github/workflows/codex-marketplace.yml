name: Codex Marketplace

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  codex-marketplace:
    runs-on: ubuntu-latest
    env:
      HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test Codex marketplace builder
        run: python3 -m unittest discover -s tests

      - name: Generate Codex marketplace
        run: python3 scripts/build_codex_marketplace.py --write

      - name: Validate Codex marketplace
        run: python3 scripts/build_codex_marketplace.py --validate

      - name: Report Codex marketplace paths
        run: python3 scripts/build_codex_marketplace.py --path-report

      - name: Check Codex marketplace freshness
        run: python3 scripts/build_codex_marketplace.py --check

      - name: Validate skills
        run: python3 scripts/skills.py validate

      - name: Audit skills
        run: python3 scripts/skills.py audit --all

      - name: Ensure generated files are committed
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated files are out of date. Run python3 scripts/build_codex_marketplace.py --write and commit the result."
            git diff --stat
            exit 1
          fi
          if [ -n "$(git status --short)" ]; then
            echo "::error::Generated files are untracked. Run python3 scripts/build_codex_marketplace.py --write and commit the result."
            git status --short
            exit 1
          fi

      - name: Publish generated marketplace
        if: github.event_name != 'pull_request' && !contains(env.HEAD_COMMIT_MESSAGE, '[skip codex-marketplace]')
        run: |
          if [ -z "$(git status --short -- .agents/plugins/marketplace.json plugins/codex/plugins)" ]; then
            echo "No Codex marketplace changes to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .agents/plugins/marketplace.json plugins/codex/plugins
          git commit -m "chore: publish codex marketplace [skip codex-marketplace]"
          git push

      - name: Skip publish commit
        if: github.event_name != 'pull_request' && contains(env.HEAD_COMMIT_MESSAGE, '[skip codex-marketplace]')
        run: echo "Skipping publish commit because head commit requested [skip codex-marketplace]."

  windows-sparse-checkout:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate and validate Codex marketplace
        shell: pwsh
        run: |
          git config --global core.longpaths false
          python scripts/build_codex_marketplace.py --write
          python scripts/build_codex_marketplace.py --validate
          python scripts/build_codex_marketplace.py --check
          python scripts/build_codex_marketplace.py --path-report

      - name: Sparse checkout in a long Windows path
        shell: pwsh
        run: |
          git config --global core.longpaths false

          $source = Join-Path $env:RUNNER_TEMP "codex-marketplace-source"
          New-Item -ItemType Directory -Force $source | Out-Null
          robocopy $env:GITHUB_WORKSPACE $source /MIR /XD .git | Out-Null
          if ($LASTEXITCODE -gt 7) { exit $LASTEXITCODE }

          git -C $source init
          git -C $source config user.name "codex-marketplace-test"
          git -C $source config user.email "codex-marketplace-test@example.invalid"
          git -C $source add .
          git -C $source commit -m "test marketplace sparse checkout"

          $longParent = Join-Path $env:RUNNER_TEMP "codex-app-marketplace-checkout-nested-nested-nested-nested"
          New-Item -ItemType Directory -Force $longParent | Out-Null
          $target = Join-Path $longParent "repo"

          git clone --no-checkout $source $target
          git -C $target sparse-checkout init --cone
          git -C $target sparse-checkout set .agents/plugins plugins/codex/plugins
          git -C $target checkout HEAD

          $marketplace = Join-Path $target ".agents/plugins/marketplace.json"
          if (!(Test-Path $marketplace)) {
            Write-Error "root marketplace.json missing after sparse checkout"
            exit 1
          }
          $oldMarketplace = Join-Path $target "plugins/codex/.agents/plugins/marketplace.json"
          if (Test-Path $oldMarketplace) {
            Write-Error "old nested marketplace.json must not exist"
            exit 1
          }
          $manifest = Get-Content $marketplace -Raw | ConvertFrom-Json
          $pluginCount = (Get-ChildItem (Join-Path $target "plugins/codex/plugins") -Directory | Measure-Object).Count
          $expectedPluginCount = ($manifest.plugins | Measure-Object).Count
          if ($pluginCount -ne $expectedPluginCount) {
            Write-Error "expected $expectedPluginCount plugins after sparse checkout, found $pluginCount"
            exit 1
          }
          foreach ($plugin in $manifest.plugins) {
            $sourcePath = $plugin.source.path
            if (!$sourcePath.StartsWith("./")) {
              Write-Error "source.path must start with ./ for $($plugin.name): $sourcePath"
              exit 1
            }
            $relativePath = $sourcePath.Substring(2).Replace("/", [System.IO.Path]::DirectorySeparatorChar)
            $pluginRoot = Join-Path $target $relativePath
            $pluginManifest = Join-Path $pluginRoot ".codex-plugin/plugin.json"
            if (!(Test-Path $pluginRoot)) {
              Write-Error "plugin root missing for $($plugin.name): $sourcePath"
              exit 1
            }
            if (!(Test-Path $pluginManifest)) {
              Write-Error "plugin manifest missing for $($plugin.name): $pluginManifest"
              exit 1
            }
            $pluginJson = Get-Content $pluginManifest -Raw | ConvertFrom-Json
            if ($pluginJson.name -ne $plugin.name) {
              Write-Error "plugin name mismatch for $($plugin.name): $($pluginJson.name)"
              exit 1
            }
          }

  editable-install-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap Python packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install editable CLI
        run: python -m pip install --no-build-isolation -e .

      - name: Smoke test CLI on Linux
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ai-skills --help
          ai-skills list
          project="$(mktemp -d)"
          ai-skills install --target repo --project "$project" --profile research-main --mode copy --dry-run

      - name: Smoke test CLI on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ai-skills --help
          ai-skills list
          $project = Join-Path $env:RUNNER_TEMP "ai-skills-smoke-project"
          New-Item -ItemType Directory -Force $project | Out-Null
          ai-skills install --target repo --project $project --profile research-main --mode copy --dry-run
